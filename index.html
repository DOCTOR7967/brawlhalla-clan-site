<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS N GEN - Elos Atualizados</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #00ff88;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      max-width: 800px;
      margin: 20px auto;
      border-collapse: collapse;
      background-color: #222;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
      text-align: left;
    }
    th {
      background-color: #00ff88;
      color: black;
    }
    tr:hover {
      background-color: #333;
    }
    .loading {
      font-size: 1.2em;
      margin: 30px;
      color: #ffcc00;
    }
    .error {
      font-size: 1.2em;
      margin: 30px;
      color: #ff4444;
    }
  </style>
</head>
<body>
  <h1>NEXUS N GEN - Elos Atualizados</h1>

  <p class="loading">Carregando elos do clã...</p>
  <p class="error" style="display:none;" id="errorMsg"></p>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Elo (Rating)</th>
        <th>Tier</th>
        <th>Região</th>
      </tr>
    </thead>
    <tbody id="tabelaElos">
      <!-- As linhas serão adicionadas aqui automaticamente -->
    </tbody>
  </table>

  <script>
    const loading = document.querySelector('.loading');
    const errorMsg = document.getElementById('errorMsg');
    const tbody = document.getElementById('tabelaElos');

    fetch('/api/update-elos')
      .then(r => {
        if (!r.ok) throw new Error('Erro na API: ' + r.status);
        return r.json();
      })
      .then(result => {
        loading.style.display = 'none';

        if (result.data && result.data.length > 0) {
          result.data.forEach(member => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${member.nome || 'N/A'}</td>
              <td>${member.rating || 'N/A'}</td>
              <td>${member.tier || 'N/A'}</td>
              <td>${member.region || 'N/A'}</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="4">Nenhum membro encontrado</td></tr>';
        }
      })
      .catch(err => {
        loading.style.display = 'none';
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Erro ao carregar os elos: ' + err.message;
        console.error('Erro completo:', err);
      });
  </script>
</body>
</html>
