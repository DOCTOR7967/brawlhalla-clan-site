<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS N GEN - Elos Atualizados</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #00ff88;
      text-align: center;
      margin: 20px 0;
      font-size: 2.5em;
      text-shadow: 0 0 10px #00ff88;
    }
    table {
      width: 100%;
      max-width: 900px;
      border-collapse: collapse;
      background-color: #222;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    th {
      background-color: #00ff88;
      color: black;
      font-weight: bold;
    }
    tr:hover {
      background-color: #333;
    }
    .loading, .error {
      font-size: 1.3em;
      margin: 40px 0;
      text-align: center;
    }
    .loading { color: #ffcc00; }
    .error { color: #ff4444; display: none; }
  </style>
</head>
<body>
  <h1>NEXUS N GEN - Elos Atualizados</h1>

  <p class="loading" id="loading">Carregando elos do clã...</p>
  <p class="error" id="errorMsg"></p>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Elo (Rating)</th>
        <th>Tier</th>
        <th>Região</th>
      </tr>
    </thead>
    <tbody id="tabelaElos"></tbody>
  </table>

  <script>
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const tbody = document.getElementById('tabelaElos');

    console.log('Iniciando fetch para /api/update-elos...');

    fetch('/api/update-elos')
      .then(r => {
        console.log('Resposta recebida. Status:', r.status);
        if (!r.ok) throw new Error(`Erro na API: ${r.status} - ${r.statusText}`);
        return r.json();
      })
      .then(result => {
        console.log('Dados recebidos:', result);
        loading.style.display = 'none';

        if (result.data && result.data.length > 0) {
          result.data.forEach(member => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${member.nome || 'N/A'}</td>
              <td>${member.rating || 'N/A'}</td>
              <td>${member.tier || 'N/A'}</td>
              <td>${member.region || 'N/A'}</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="4">Nenhum membro encontrado</td></tr>';
        }
      })
      .catch(err => {
        console.error('Erro no fetch:', err);
        loading.style.display = 'none';
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Erro ao carregar os elos: ' + err.message;
      });
  </script>
</body>
</html>
