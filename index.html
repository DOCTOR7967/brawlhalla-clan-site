<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS N GEN - Elos Atualizados</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #00ff88;
      text-align: center;
      margin: 20px 0;
      font-size: 2.5em;
      text-shadow: 0 0 10px #00ff88;
    }
    table {
      width: 100%;
      max-width: 900px;
      border-collapse: collapse;
      background-color: #222;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    th {
      background-color: #00ff88;
      color: black;
      font-weight: bold;
    }
    tr:hover {
      background-color: #333;
    }
    .loading {
      font-size: 1.3em;
      color: #ffcc00;
      margin: 40px 0;
      text-align: center;
    }
    .error {
      font-size: 1.3em;
      color: #ff4444;
      margin: 40px 0;
      text-align: center;
      display: none;
    }
    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead tr {
        position: absolute;
        top: -9999px;
        left: -9999px;
      }
      tr {
        margin: 0 0 1rem 0;
        border: 1px solid #444;
        border-radius: 8px;
      }
      td {
        border: none;
        border-bottom: 1px solid #444;
        position: relative;
        padding-left: 50%;
      }
      td:before {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 45%;
        padding-right: 10px;
        white-space: nowrap;
        font-weight: bold;
      }
      td:nth-of-type(1):before { content: "Nome"; }
      td:nth-of-type(2):before { content: "Elo (Rating)"; }
      td:nth-of-type(3):before { content: "Tier"; }
      td:nth-of-type
